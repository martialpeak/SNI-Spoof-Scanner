name: Build Android APK (Flutter Native Auto-Setup)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Create Flutter Project
        # اینجا گیت‌هاب خودش پوشه‌ها و فایل‌های لازم مثل pubspec.yaml را می‌سازد
        run: flutter create mobile_app --org "com.seramo.sniscanner"

      - name: Inject Your Custom Code
        # این دستور، فایل main.dart شما را می‌برد داخل پوشه lib قرار می‌دهد
        run: cp main.dart mobile_app/lib/main.dart

      - name: Add Android Internet Permission
        # اپلیکیشن‌های اندروید برای اسکن نیاز به دسترسی اینترنت دارند
        run: |
          sed -i '/<application/i \    <uses-permission android:name="android.permission.INTERNET"/>' mobile_app/android/app/src/main/AndroidManifest.xml

      - name: Build Android APK
        working-directory: ./mobile_app
        run: flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SNI-Scanner-Android-APK
          path: mobile_app/build/app/outputs/flutter-apk/app-release.apk
