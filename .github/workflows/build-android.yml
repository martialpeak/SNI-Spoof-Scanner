name: Build Android APK (Flutter Native)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Create Flutter Project
        run: |
          flutter create mobile_app --org "com.seramo.sniscanner"
          cp main.dart mobile_app/lib/main.dart

      - name: Install Dependencies
        working-directory: ./mobile_app
        run: |
          flutter pub add file_picker:^8.0.0 share_plus:^9.0.0
          flutter pub get

      - name: Add Android Permissions
        run: |
          sed -i '/<application/i \    <uses-permission android:name="android.permission.INTERNET"/>\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"/>\n    <uses-permission android:name="android.permission.VIBRATE"/>' mobile_app/android/app/src/main/AndroidManifest.xml

      - name: Build Android APK
        working-directory: ./mobile_app
        run: flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SNI-Scanner-Android-APK
          path: mobile_app/build/app/outputs/flutter-apk/app-release.apk
