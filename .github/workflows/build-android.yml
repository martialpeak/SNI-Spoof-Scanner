name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Flet
        run: |
          python -m pip install --upgrade pip
          pip install flet

      - name: Build Android APK
        # این دستور کد main.py شما را به APK اندروید تبدیل می‌کند
        run: flet build apk --product "SNI-Scanner-Mobile" --org "com.seramo.sniscanner"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SNI-Scanner-Android-APK
          path: build/apk/*.apk
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SNI-Scanner-Go-APK
          path: "*.apk"
