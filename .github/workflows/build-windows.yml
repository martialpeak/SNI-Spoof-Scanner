name: Build and Release Final

on:
  push:
    tags:
      - 'v*' # اجرای بیلد فقط زمانی که یک تگ جدید (مثل v1.0) ثبت کنید

jobs:
  # بخش اول: بیلد نسخه ویندوز
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Create EXE
        run: pyinstaller --noconsole --onefile --clean --name "SNI-Scanner-Win" windows_app.py

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: win-bin
          path: dist/*.exe

  # بخش دوم: بیلد نسخه اندروید (اصلاح شده برای فلاتر)
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Prepare Flutter Project
        run: |
          flutter create mobile_app --org "com.seramo.sniscanner"
          cp main.dart mobile_app/lib/main.dart

      - name: Install Dependencies
        working-directory: ./mobile_app
        run: |
          flutter pub add file_picker:^8.0.0 share_plus:^9.0.0
          flutter pub get

      - name: Add Permissions to AndroidManifest
        run: |
          sed -i '/<application/i \    <uses-permission android:name="android.permission.INTERNET"/>\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"/>\n    <uses-permission android:name="android.permission.VIBRATE"/>' mobile_app/android/app/src/main/AndroidManifest.xml

      - name: Build APK
        working-directory: ./mobile_app
        run: flutter build apk --release

      - name: Upload Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-bin
          path: mobile_app/build/app/outputs/flutter-apk/app-release.apk

  # بخش سوم: ایجاد ریلیس و آپلود فایل‌ها در صفحه Releases گیت‌هاب
  release:
    needs: [build-windows, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: bin-files

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            bin-files/win-bin/*.exe
            bin-files/apk-bin/*.apk
          tag_name: ${{ github.ref_name }}
          name: "SNI Scanner Version ${{ github.ref_name }}"
          body: "خروجی جدید برای ویندوز و اندروید آماده شد. 🚀"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
