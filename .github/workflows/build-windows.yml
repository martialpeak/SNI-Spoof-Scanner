name: Build Windows Pro App

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      - name: Build Windows EXE
        # ایجاد یک فایل تک‌فایله و بدون باز شدن پنجره CMD
        run: pyinstaller --noconsole --onefile --name "SNI-Scanner-Pro" windows_app.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SNI-Scanner-Pro-Windows
          path: dist/*.exe
