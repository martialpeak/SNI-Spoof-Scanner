name: Build and Release Final

on:
  push:
    tags:
      - 'v*' # اجرای بیلد فقط با تگ جدید (مثل v2.0)

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: |
          pip install pyinstaller
          pyinstaller --noconsole --onefile --clean --name "SNI-Scanner-Win" windows_app.py
      - uses: actions/upload-artifact@v4
        with:
          name: win-exe
          path: dist/*.exe

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
      - run: |
          pip install flet
          flet build apk --product "SNI-Scanner-Mobile"
      - uses: actions/upload-artifact@v4
        with:
          name: apk-file
          path: build/apk/*.apk

  publish:
    needs: [build-windows, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: releases
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            releases/win-exe/*.exe
            releases/apk-file/*.apk
          tag_name: ${{ github.ref_name }}
          name: "SNI Scanner Version ${{ github.ref_name }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
