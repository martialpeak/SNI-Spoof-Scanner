name: Build Windows App

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # روش جدید نیازمند فایل requirements.txt است، پس آن را به صورت خودکار می‌سازیم
      - name: Create requirements.txt
        shell: bash
        run: echo "flet" > requirements.txt

      - name: Install Flet
        run: |
          python -m pip install --upgrade pip
          pip install flet

      - name: Build Windows App (Native Flutter)
        # دستور مدرنِ بیلد که به صورت پیش‌فرض بدون کنسول و کاملاً بومی است
        run: flet build windows --product "SNI-Scanner" --org "com.seramo.sniscanner"

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SNI-Scanner-Windows
          # کل پوشه خروجی را آپلود می‌کند
          path: build/windows/
          retention-days: 7
