name: Build and Release

on:
  push:
    tags:
      - 'v*' # زمانی اجرا می‌شود که تگی مثل v1.0 بزنید

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: |
          pip install pyinstaller
          pyinstaller --noconsole --onefile --clean --name "SNI-Scanner-Win" windows_app.py
      - uses: actions/upload-artifact@v4
        with:
          name: windows-bin
          path: dist/*.exe

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
      - run: |
          pip install flet
          flet build apk --product "SNI-Scanner-Android"
      - uses: actions/upload-artifact@v4
        with:
          name: android-bin
          path: build/apk/*.apk

  release:
    needs: [build-windows, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-files
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release-files/windows-bin/*.exe
            release-files/android-bin/*.apk
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
