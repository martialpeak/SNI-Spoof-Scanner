name: Build Windows App

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # نصب فلاتر برای جلوگیری از توقف پروسه و درخواست y/n
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Create requirements.txt
        shell: bash
        run: echo "flet" > requirements.txt

      - name: Install Flet
        run: |
          python -m pip install --upgrade pip
          pip install flet

      - name: Build Windows App (Native Flutter)
        # استفاده از bash برای حل قطعی مشکل یونیکد در سرورهای مایکروسافت
        shell: bash
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUTF8: 1
        run: flet build windows --product "SNI-Scanner" --org "com.seramo.sniscanner"

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SNI-Scanner-Windows
          path: build/windows/
          retention-days: 7
